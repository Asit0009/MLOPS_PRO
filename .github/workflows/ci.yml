name: MLOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Tests
      run: |
        python test_model.py
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
      
    - name: Build Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false
        tags: ml-model:test

  deploy-to-test:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy model to testing environment
      run: |
        echo "Simulating deployment to testing environment..."
        # In a real scenario, this would push the Docker image to a registry 
        # and/or deploy it to a staging server/cluster.
        echo "Deployment to testing environment successful."
